<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@Furqs7 Content Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0A0A0A 0%, #1a1a1a 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px 20px;
      background: rgba(255, 107, 53, 0.1);
      border: 2px solid #FF6B35;
      border-radius: 16px;
    }
    
    .header h1 {
      font-size: 48px;
      font-weight: 900;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #FF6B35, #00D9FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .header p {
      color: rgba(255,255,255,0.7);
      font-size: 16px;
    }
    
    .api-input {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 30px;
    }
    
    .api-input input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 12px;
      color: #fff;
      font-size: 14px;
      font-family: 'Courier New', monospace;
    }
    
    .api-input input::placeholder {
      color: rgba(255,255,255,0.3);
    }
    
    .generate-btn {
      width: 100%;
      background: linear-gradient(135deg, #FF6B35, #ff8555);
      border: none;
      border-radius: 12px;
      padding: 18px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 30px;
      transition: transform 0.2s;
    }
    
    .generate-btn:hover {
      transform: scale(1.02);
    }
    
    .generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .posts-container {
      display: grid;
      gap: 20px;
    }
    
    .post-card {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      display: grid;
      gap: 16px;
    }
    
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .category-badge {
      background: rgba(0, 217, 255, 0.2);
      color: #00D9FF;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .post-content {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(255,255,255,0.9);
    }
    
    .flyer-preview {
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      max-width: 300px;
      margin: 0 auto;
    }
    
    .flyer-preview img {
      width: 100%;
      display: block;
    }
    
    .post-actions {
      display: flex;
      gap: 12px;
    }
    
    .copy-btn, .download-btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .copy-btn {
      background: rgba(0, 217, 255, 0.2);
      color: #00D9FF;
    }
    
    .download-btn {
      background: rgba(255, 107, 53, 0.2);
      color: #FF6B35;
    }
    
    .copy-btn:hover, .download-btn:hover {
      transform: scale(1.02);
    }
    
    .error {
      background: rgba(255, 0, 0, 0.1);
      border: 2px solid #ff0000;
      border-radius: 12px;
      padding: 16px;
      color: #ff6b6b;
      margin-bottom: 20px;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.6);
    }
    
    @media (max-width: 768px) {
      .header h1 {
        font-size: 32px;
      }
      
      .post-card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>@FURQS7</h1>
      <p>AI-Powered Content Engine with Auto-Flyer Generation</p>
    </div>
    
    <div class="api-input">
      <input 
        type="password" 
        id="apiKey" 
        placeholder="Enter your Anthropic API key (sk-ant-api03-...)"
        value=""
      />
    </div>
    
    <button class="generate-btn" id="generateBtn" onclick="generatePosts()">
      🔄 Generate New Posts with Flyers
    </button>
    
    <div id="error"></div>
    <div id="posts"></div>
  </div>

  <script>
    const savedKey = localStorage.getItem('anthropicApiKey');
    if (savedKey) {
      document.getElementById('apiKey').value = savedKey;
    }
    
    document.getElementById('apiKey').addEventListener('change', (e) => {
      localStorage.setItem('anthropicApiKey', e.target.value);
    });
    
    const categories = [
      { name: 'A16z Scout Bait', topic: 'scaling strategies' },
      { name: 'Stablecoins/Kliqfi', topic: 'real-world payments' },
      { name: 'Crypto Rage Bait', topic: 'exit liquidity farmers' },
      { name: 'AI Insights', topic: 'production AI systems' },
      { name: 'Dubai Lifestyle', topic: 'founder morning routine' }
    ];
    
    async function generatePosts() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const errorDiv = document.getElementById('error');
      const postsDiv = document.getElementById('posts');
      const btn = document.getElementById('generateBtn');
      
      errorDiv.innerHTML = '';
      
      if (!apiKey) {
        errorDiv.innerHTML = '<div class="error">Please enter your API key first</div>';
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '⏳ Generating...';
      postsDiv.innerHTML = '<div class="loading">Generating 5 posts with flyers...</div>';
      
      try {
        const posts = [];
        
        for (const cat of categories) {
          const response = await fetch('/.netlify/functions/generate-post', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              category: cat.name,
              topic: cat.topic,
              apiKey: apiKey
            })
          });
          
          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || `Failed to generate ${cat.name} post`);
          }
          
          const data = await response.json();
          posts.push(data);
        }
        
        displayPosts(posts);
        
      } catch (error) {
        errorDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
        postsDiv.innerHTML = '';
      } finally {
        btn.disabled = false;
        btn.textContent = '🔄 Generate New Posts with Flyers';
      }
    }
    
    function displayPosts(posts) {
      const postsDiv = document.getElementById('posts');
      postsDiv.innerHTML = posts.map((post, index) => {
        const svgDataUrl = 'data:image/svg+xml,' + encodeURIComponent(post.flyer);
        
        return `
          <div class="post-card">
            <div class="post-header">
              <div class="category-badge">${post.category}</div>
            </div>
            
            <div class="post-content">${escapeHtml(post.content)}</div>
            
            <div class="flyer-preview">
              <img src="${svgDataUrl}" alt="${post.category} flyer" id="flyer-${index}"/>
            </div>
            
            <div class="post-actions">
              <button class="copy-btn" onclick="copyPost(\`${escapeForJs(post.content)}\`)">
                📋 Copy Post
              </button>
              <button class="download-btn" onclick="downloadFlyer(${index}, '${escapeForJs(post.category)}')">
                ⬇️ Download Flyer
              </button>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function copyPost(text) {
      navigator.clipboard.writeText(text);
      alert('✅ Post copied to clipboard!');
    }
    
    function downloadFlyer(index, category) {
      const img = document.getElementById(`flyer-${index}`);
      const canvas = document.createElement('canvas');
      canvas.width = 1080;
      canvas.height = 1080;
      const ctx = canvas.getContext('2d');
      
      const tempImg = new Image();
      tempImg.onload = function() {
        ctx.drawImage(tempImg, 0, 0);
        canvas.toBlob(function(blob) {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `furqs7-${category.toLowerCase().replace(/\s+/g, '-')}-${Date.now()}.png`;
          a.click();
          URL.revokeObjectURL(url);
        });
      };
      tempImg.src = img.src;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function escapeForJs(text) {
      return text.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
    }
  </script>
</body>
</html>
